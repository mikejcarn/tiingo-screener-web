<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tiingo Screener</title>
<link rel="stylesheet" href="/static/css/style.css">
<script>try{if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light')}catch{}</script>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

<!-- ── Nav bar ──────────────────────────────────────────────── -->
<div id="nav">
  <button id="btn-prev-ticker" title="Previous ticker (=)">&#9664;</button>
  <div id="ticker-wrap">
    <input id="ticker-input" type="text" autocomplete="off" spellcheck="false" placeholder="ticker"
      title="Search and select a ticker (type any lowercase letter, or press /)">
    <div id="dropdown"></div>
  </div>
  <button id="btn-next-ticker" title="Next ticker (-)">&#9654;</button>
  <span id="ticker-count" title="Position in ticker list"></span>
  <div class="nav-sep"></div>
  <span class="nav-label">list</span>
  <select id="list-select" title="Ticker list (_ previous / + next)"></select>
  <span class="nav-label">timeframe</span>
  <select id="tf-select" title="Timeframe ([ previous / ] next)"></select>
  <span class="nav-label">indicators</span>
  <select id="conf-select" title="Indicator configuration ({ previous / } next)"></select>
  <div class="nav-right">
    <div class="page-nav">
      <a class="page-nav-item" href="/fetch" title="Go to tickers page (T)">tickers</a>
      <a class="page-nav-item" href="/indicators" title="Go to indicators page (I)">indicators</a>
      <a class="page-nav-item" href="/scanner" title="Go to scanner page (A)">scanner</a>
      <span class="page-nav-item active" title="Chart page (C)">chart</span>
    </div>
    <button class="btn-theme-toggle" title="Switch to light mode">☀</button>
    <button class="btn-help-nav" title="Keyboard shortcuts (?)">?</button>
  </div>
</div>

<!-- ── Chart ────────────────────────────────────────────────── -->
<div id="chart-container">
  <div id="chart"></div>
  <div id="status"></div>
  <div id="chart-empty" style="display:none;">
    <div>
      <p>No chart data yet.</p>
      <p>Head to the <a href="/fetch">Tickers</a> page, add a ticker, and hit <strong>Fetch</strong>.</p>
      <p>Once it's fetched — and indicators are computed on the <a href="/indicators">Indicators</a> page — the chart will show up here.</p>
    </div>
  </div>
</div>

<!-- ── Replay controls ──────────────────────────────────────── -->
<div id="controls">
  <button id="btn-first"     title="Jump to first bar (Home)">&#x23EE;</button>
  <button id="btn-step-back" title="Step back one bar (← or Shift+← for 20)">&#9664;</button>
  <button id="btn-play"      title="Play / pause (Space — rewinds if at last bar)">&#9654;</button>
  <button id="btn-step-fwd"  title="Step forward one bar (→ or Shift+→ for 20)">&#9654;&#9654;</button>
  <button id="btn-last"      title="Jump to last bar (End)">&#x23ED;</button>
  <div class="nav-sep"></div>
  <input id="scrubber" type="range" min="0" max="1000" value="0" step="1"
    title="Click to jump, or drag to scrub to any bar (double-click the chart to jump there too)">
  <div class="nav-sep"></div>
  <label title="Current bar — type a number and press Enter to jump (press any digit key to focus this field)">bar
    <input id="bar-input" type="text" class="ctrl-inp" autocomplete="off"
      title="Type a bar number and press Enter to jump (any digit key focuses this field)"> / <span id="bar-total" title="Total bars in dataset">—</span></label>
  <span class="ctrl-dot">·</span>
  <label title="Current date — type YYYY-MM-DD and press Enter to jump">date
    <input id="date-input" type="text" class="ctrl-inp" placeholder="YYYY-MM-DD" autocomplete="off" spellcheck="false"
      title="Type a date (YYYY-MM-DD) and press Enter to jump"> / <span id="date-end" title="Last bar date">—</span></label>
  <div class="nav-sep"></div>
  <select id="lock-mode"
    title="Load position — where each ticker starts when loaded (\ to cycle)">
    <option value="start">start</option>
    <option value="end">end</option>
    <option value="bar">bar</option>
    <option value="date">date</option>
  </select>
  <input id="lock-value" type="text" class="nav-inp" placeholder="YYYY-MM-DD" spellcheck="false" autocomplete="off"
    title="Target bar or date for load position (Enter to confirm)">
  <button id="btn-autofit"    title="Fit all candles across the chart width (Backspace)">&#x2194;</button>
  <button id="btn-fullscreen" title="Toggle fullscreen — hides nav &amp; controls bars (F or `)">&#x26F6;&#xFE0E;</button>
  <div class="nav-sep"></div>
  <label title="Playback speed in frames per second (↑ ↓ to adjust)">fps
    <input id="fps-input" type="number" class="ctrl-inp" min="1" max="60" step="1"
      title="Frames per second — 1 is slowest, 60 is fastest"></label>
</div>


<script type="module">
  import { initBrowse } from '/static/js/browse.js';
  initBrowse();
</script>
</body>
</html>
