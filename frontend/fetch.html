<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fetch — Tiingo Screener</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="dash fetch-page">

<div id="dash-header">
  <span id="dash-title">Tiingo Screener</span>
  <div class="page-nav">
    <span class="page-nav-item active" title="Tickers page (T)">tickers</span>
    <a class="page-nav-item" href="/indicators" title="Go to indicators page (I)">indicators</a>
    <a class="page-nav-item" href="/" title="Go to chart page (C)">chart</a>
  </div>
</div>

<div class="fetch-layout">

  <!-- ── Left column ───────────────────────────────────────── -->
  <div class="fetch-left">

    <!-- API Key -->
    <div class="dash-section">
      <div class="dash-section-head">
        <span>API Key</span>
        <div class="dash-section-actions">
          <button id="btn-apikey-add" class="dash-btn-sm dash-btn-sm-add" style="display:none;" title="Add your Tiingo API key">+ Add Key</button>
        </div>
      </div>
      <div style="padding:14px 16px;">
        <div class="dash-field">
          <label><a href="https://www.tiingo.com" target="_blank" class="label-link">Tiingo</a> key</label>
          <div class="dash-field-right" style="flex:1; gap:8px;">
            <span id="apikey-masked" class="apikey-masked"></span>
            <input id="apikey-input" class="apikey-input" type="password"
                   placeholder="Paste key…" style="display:none; flex:1;" title="Paste your Tiingo API key, then press Enter or Save">
            <button id="btn-apikey-edit"   class="dash-btn-sm" style="display:none;" title="Edit the saved API key">Edit</button>
            <button id="btn-apikey-save"   class="dash-btn-sm" style="display:none;" title="Save this key">Save</button>
            <button id="btn-apikey-cancel" class="dash-btn-sm" style="display:none;" title="Discard changes (Esc)">Cancel</button>
            <button id="btn-apikey-verify" class="dash-btn-sm" style="display:none;" title="Check that this key works with Tiingo">Verify</button>
            <button id="btn-apikey-delete" class="dash-btn-sm dash-btn-sm-del" style="display:none;" title="Remove the saved API key">Delete</button>
            <span   id="apikey-status"></span>
          </div>
        </div>

        <div class="dash-divider"></div>

        <div class="tiingo-ref-row">
          <span class="tiingo-ref-label">Tiingo supported tickers</span>
          <button id="btn-update-tickers" class="dash-btn-sm" title="Re-download the full Tiingo supported-tickers list used for search">Update</button>
          <a href="https://apimedia.tiingo.com/docs/tiingo/daily/supported_tickers.zip"
             target="_blank" class="tiingo-ref-link" title="Download supported_tickers.zip from Tiingo">&#x2197; download list</a>
        </div>
        <div id="tiingo-list-meta" class="tiingo-ref-meta"></div>
      </div>
    </div>

    <!-- Single Ticker -->
    <div class="dash-section">
      <div class="dash-section-head">
        <span>Single Ticker</span>
        <div class="dash-section-actions">
          <button id="btn-single-fetch" class="dash-btn-sm dash-btn-sm-launch" title="Fetch all queued tickers below">Fetch</button>
        </div>
      </div>
      <div style="padding:16px;">
        <div class="fetch-add-row">
          <div id="single-ticker-wrap">
            <input id="single-ticker" class="dash-ticker-input" type="text"
                   placeholder="Type to select ticker…" autocomplete="off" spellcheck="false"
                   title="Type any lowercase letter to search tickers, ↑↓ to navigate suggestions, Enter to add">
            <div id="single-ticker-dd"></div>
          </div>
          <button id="btn-single-add" class="dash-btn-sm dash-btn-sm-add" title="Add this ticker to the queue below (or press Enter in the box)">+ Add to Queue</button>
        </div>
        <div class="dash-field">
          <label>Timeframes</label>
          <div id="single-tfs" class="dash-checks"></div>
        </div>
        <div id="single-queue" class="run-queue-list"></div>
      </div>
    </div>

    <!-- Batch Fetch -->
    <div class="dash-section">
      <div class="dash-section-head">
        <span>Batch Fetch</span>
        <div class="dash-section-actions">
          <button id="btn-fetch" class="dash-btn-sm dash-btn-sm-launch" title="Fetch all queued lists below">Fetch</button>
          <button id="btn-fetch-cancel" class="dash-btn-sm dash-btn-sm-del" style="display:none" title="Cancel the running fetch">Cancel</button>
        </div>
      </div>
      <div style="padding:16px;">
        <div class="dash-field">
          <label>List</label>
          <div class="dash-field-right">
            <select id="fetch-list" title="Choose a ticker list to fetch"></select>
            <span id="fetch-list-count" class="dash-count" title="Number of tickers in this list"></span>
            <button id="btn-batch-add" class="dash-btn-sm dash-btn-sm-add" title="Add this list to the queue below">+ Add to Queue</button>
          </div>
        </div>
        <div class="dash-field">
          <label>Timeframes</label>
          <div id="fetch-tfs" class="dash-checks"></div>
        </div>
        <div id="batch-queue" class="run-queue-list"></div>
      </div>
    </div>

    <!-- Ticker Lists -->
    <div class="dash-section">
      <div class="dash-section-head">
        <span>Ticker Lists</span>
        <div class="dash-section-actions">
          <button id="btn-add-list" class="dash-btn-sm dash-btn-sm-add" title="Upload a CSV to create a new ticker list">+ Add List</button>
        </div>
      </div>
      <div style="padding:12px 16px 14px;">

        <div id="ticker-list-items" class="ticker-list-items"></div>
        <div id="drop-zone" class="drop-zone" title="Drag a CSV file here, or click to browse">
          <input id="file-input" type="file" accept=".csv" style="display:none">
          <span class="drop-zone-text">Drop CSV here or <button id="btn-browse" class="drop-zone-browse" title="Choose a CSV file to upload">browse</button></span>
          <span id="upload-status" class="upload-status"></span>
        </div>

      </div>
    </div>

  </div>

  <!-- ── Right column ──────────────────────────────────────── -->
  <div class="fetch-right">

    <!-- Database (expands to fill) -->
    <div class="dash-section fetch-db">
      <div class="dash-section-head">
        <span>Database</span>
        <div class="dash-section-actions">
          <button id="btn-refresh-stats" title="Refresh the database stats">&#x21BB;</button>
          <button id="btn-clear-all" class="dash-btn-sm dash-btn-sm-del" title="Delete ALL fetched data from the database">Clear All</button>
        </div>
      </div>
      <div id="stats-summary"></div>
      <div id="stats-wrap">
        <table id="stats-table">
          <thead>
            <tr>
              <th>Ticker</th>
              <th>Timeframe</th>
              <th>List</th>
              <th>Last Date</th>
              <th>Rows</th>
              <th>Fetched</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="stats-body">
            <tr><td colspan="6" class="stats-empty">No data yet.</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Fetch History (pinned at bottom) -->
    <div class="dash-section fetch-history">
      <div class="dash-section-head"><span>Fetch History</span></div>
      <div id="history-wrap">
        <table id="history-table">
          <thead>
            <tr>
              <th>Session</th>
              <th>List</th>
              <th>Timeframe</th>
              <th>Tickers</th>
              <th>Last Date</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="history-body">
            <tr><td colspan="5" class="stats-empty">No history yet.</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

</div>

<script type="module" src="/static/js/fetch.js"></script>
</body>
</html>
