<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Indicators — Tiingo Screener</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="ind-page">

<div id="ind-header">
  <span id="ind-title">Tiingo Screener</span>
  <div class="page-nav">
    <a class="page-nav-item" href="/">chart</a>
    <a class="page-nav-item" href="/fetch">tickers</a>
    <span class="page-nav-item active">indicators</span>
  </div>
</div>

<div class="ind-layout">

  <!-- ── Left: config list ──────────────────────────────── -->
  <div class="ind-sidebar">
    <div class="ind-sidebar-head">
      Configs
      <button id="btn-new-config" title="Create new config">+ New</button>
    </div>
    <div id="config-list">
      <div class="ind-loading">Loading…</div>
    </div>
  </div>

  <!-- ── Center: editor ─────────────────────────────────── -->
  <div class="ind-main">

    <div id="ind-empty" class="ind-empty">
      <div>
        <p>No indicator configs yet.</p>
        <p>Click <strong>+ New</strong> to create one.</p>
      </div>
    </div>

    <div id="ind-editor" style="display:none; flex-direction:column; height:100%;">

      <div class="ind-editor-top">
        <input type="text" id="config-name" class="config-name-input" placeholder="Config name">
        <button id="btn-save" class="ind-btn-save" title="Save config to database">Save</button>
        <button id="btn-clear-results" class="btn-destructive" title="Delete computed indicator results for this config">Clear Results</button>
        <button id="btn-delete-config" class="btn-destructive" title="Delete this config and its results">Delete</button>
      </div>
      <div id="conf-dates" class="conf-dates"></div>

      <div class="tf-tabs" id="tf-tabs">
        <button class="tf-tab active" data-tf="daily">daily</button>
        <button class="tf-tab" data-tf="weekly">weekly</button>
        <button class="tf-tab" data-tf="1hour">1hour</button>
        <button class="tf-tab" data-tf="4hour">4hour</button>
        <button class="tf-tab" data-tf="5min">5min</button>
      </div>

      <div class="ind-search-bar">
        <input type="text" id="ind-search" class="ind-search-input" placeholder="Type to find indicators…" autocomplete="off" spellcheck="false">
      </div>

      <div id="ind-list" class="ind-list"></div>

    </div>
  </div>

  <!-- ── Right: run + history ───────────────────────────── -->
  <div class="ind-right">

    <!-- Run + DB output card -->
    <div class="ind-run">
      <div class="ind-run-head">Run</div>
      <div class="ind-run-body">

        <div id="run-conf-list" class="run-queue-list"></div>
        <div id="run-queue-status" class="run-queue-status" style="display:none;"></div>

        <div class="dash-btn-row">
          <button id="btn-compute" class="dash-btn">Run</button>
          <button id="btn-compute-cancel" class="dash-btn-cancel" style="display:none">Cancel</button>
        </div>

        <div class="dash-progress">
          <div id="comp-track" class="progress-track"><div id="comp-bar" class="progress-fill"></div></div>
          <div id="comp-meta" class="progress-meta">
            <span id="comp-count"   class="dash-count-text"></span>
            <span id="comp-pct"     class="dash-pct"></span>
            <span id="comp-current" class="dash-current"></span>
            <span id="comp-errors"  class="dash-errors"></span>
          </div>
        </div>

        <div id="comp-feed" class="ind-feed" style="display:none;"></div>

      </div>
    </div>

    <!-- DB card -->
    <div class="ind-db-card">
      <div class="ind-run-head">DB — indicators</div>
      <div class="ind-db-body">

        <div class="ind-db-nav-row">
          <div class="ind-db-ctrl-group">
            <button id="db-conf-prev" class="ind-db-nav-btn">‹</button>
            <span id="db-conf-label" class="ind-db-conf-label">—</span>
            <button id="db-conf-next" class="ind-db-nav-btn">›</button>
          </div>
          <div class="ind-db-ctrl-group">
            <button id="db-ticker-prev" class="ind-db-nav-btn" title="Previous ticker">‹</button>
            <input type="text" id="comp-db-ticker" class="ind-db-ticker-input" placeholder="ticker" autocomplete="off" spellcheck="false">
            <button id="db-ticker-next" class="ind-db-nav-btn" title="Next ticker">›</button>
          </div>
          <div class="ind-db-ctrl-group">
            <button id="db-tf-prev" class="ind-db-nav-btn">‹</button>
            <span id="db-tf-display" class="ind-db-tf-display">—</span>
            <button id="db-tf-next" class="ind-db-nav-btn">›</button>
          </div>
        </div>

        <div class="ind-db-info-row">
          <div id="comp-db-stats" class="ind-db-stats"></div>
          <div class="ind-db-row-ctrl">
            <button id="db-rows-older" class="ind-db-nav-btn">‹ older</button>
            <span id="db-rows-label" class="ind-db-rows-label"></span>
            <button id="db-rows-newer" class="ind-db-nav-btn">newer ›</button>
          </div>
        </div>

        <div class="ind-db-table-wrap">
          <table id="comp-db-table" class="ind-db-table"></table>
        </div>

      </div>
    </div>

    <!-- History card -->
    <div class="ind-history">
      <div class="ind-run-head">Run History</div>
      <div class="ind-history-wrap">
        <table class="ind-history-table">
          <thead>
            <tr>
              <th>Config</th>
              <th>Timeframes</th>
              <th>Tickers</th>
              <th>Errors</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="ind-history-body">
            <tr><td colspan="5" class="stats-empty">No history yet.</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div><!-- .ind-right -->

</div>

<script type="module" src="/static/js/indicators.js"></script>
</body>
</html>
